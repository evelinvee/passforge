<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PassForge — Password Generator & Strength Checker</title>
<meta name="description" content="PassForge — generate 10 strong passwords and check password strength. Cryptographically secure, single HTML file, no dependencies." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --ink:#0d0f12; --text:#16191e; --muted:#8b9099; --faint:#b8bcc4;
    --line:#ededf0; --line2:#dcdee3; --soft:#f7f7f8;
    --sans:"Inter",system-ui,-apple-system,Segoe UI,Arial,sans-serif;
    --mono:"JetBrains Mono","Consolas",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.5;-webkit-text-size-adjust:100%}

  .app{min-height:100%;display:flex;flex-direction:column}

  .appbar{display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:18px 30px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:11px}
  .mark{width:32px;height:32px;border-radius:9px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px}
  .brand h1{font-size:19px;font-weight:800;letter-spacing:-.5px}
  .tabs{display:flex;gap:26px}
  .tab{background:none;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);
    padding:6px 0;border-bottom:2px solid transparent;transition:.15s}
  .tab.active{color:var(--ink);border-bottom-color:var(--ink)}

  .main{flex:1;min-height:0}

  /* GENERATE — two panes */
  .pane2{height:100%;display:grid;grid-template-columns:minmax(320px,380px) 1fr}
  .controls{padding:30px;border-right:1px solid var(--line2);overflow:auto;background:#f1f2f5}
  .results{padding:26px 34px;overflow:auto;display:flex;flex-direction:column}

  .block{margin-bottom:30px}
  .lbl{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
  .lbl .t{font-size:12px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:.7px}
  .lbl .v{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--ink)}

  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:2px;background:var(--line2);outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--ink);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--ink);border:none;cursor:pointer}

  .toggles{display:flex;flex-direction:column}
  .tg{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}
  .tg:last-child{border-bottom:none}
  .tg span{font-size:14px;color:var(--text)}
  .switch{position:relative;width:42px;height:24px;flex:none}
  .switch input{display:none}
  .track{position:absolute;inset:0;background:#d7d9de;border-radius:13px;transition:.15s;cursor:pointer}
  .track::after{content:"";position:absolute;top:2.5px;left:2.5px;width:19px;height:19px;background:#fff;border-radius:50%;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .switch input:checked + .track{background:var(--ink)}
  .switch input:checked + .track::after{transform:translateX(18px)}

  .btnrow{display:flex;gap:10px;margin-top:26px}
  .btn{font-family:var(--sans);font-weight:600;font-size:14.5px;border-radius:10px;padding:14px 18px;cursor:pointer;transition:.12s}
  .btn.primary{flex:1;color:#fff;background:var(--ink);border:1px solid var(--ink)}
  .btn.primary:hover{background:#000}
  .btn.ghost{color:var(--ink);background:#fff;border:1px solid var(--line2)}
  .btn.ghost:hover{background:var(--soft)}
  .btn:active{transform:translateY(1px)}

  .listhead{display:flex;justify-content:space-between;align-items:center;margin:0 2px 14px;font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.7px}
  .list{border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .pw{display:flex;align-items:center;gap:14px;padding:15px 16px;border-bottom:1px solid var(--line);transition:background .12s}
  .pw:last-child{border-bottom:none}
  .pw:hover{background:var(--soft)}
  .pw .val{flex:1;font-family:var(--mono);font-size:15px;font-weight:500;word-break:break-all;letter-spacing:.2px;color:var(--ink);cursor:pointer}
  .pw .val .d,.pw .val .s{color:var(--faint)}
  .bits{flex:none;font-family:var(--mono);font-size:11.5px;font-weight:500;color:var(--muted);white-space:nowrap}
  .cp{flex:none;width:36px;height:36px;border:1px solid var(--line2);background:#fff;color:var(--ink);border-radius:8px;cursor:pointer;font-size:15px;transition:.12s}
  .cp:hover{background:var(--soft)}
  .cp:active{transform:scale(.9)}
  .resfoot{margin-top:auto;padding-top:18px;font-size:11.5px;color:var(--faint);line-height:1.7}
  .resfoot b{color:var(--muted);font-weight:600}

  /* CHECK pane */
  .centerpane{height:100%;overflow:auto;display:flex;justify-content:center;padding:48px 30px}
  .checkinner{width:100%;max-width:480px}
  .inputwrap{position:relative}
  .checkbox-input{width:100%;font-family:var(--mono);font-size:16px;color:var(--ink);background:#fff;border:1px solid var(--line2);border-radius:11px;padding:16px 48px 16px 16px;outline:none;transition:border-color .15s}
  .checkbox-input:focus{border-color:var(--ink)}
  .eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:8px}
  .meter{height:2px;background:var(--line);overflow:hidden;margin:26px 0 20px}
  .meter > i{display:block;height:100%;width:0;background:var(--ink);transition:width .3s}
  .cgrid{display:flex;gap:14px}
  .cbox{flex:1;border:1px solid var(--line);border-radius:12px;padding:20px 18px}
  .cbox .t{font-size:11px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.6px}
  .cbox .v{font-size:23px;font-weight:800;letter-spacing:-.3px}
  .cbox .v small{font-size:13px;font-weight:600;color:var(--muted)}
  .hint{font-size:12.5px;color:var(--muted);margin-top:22px;line-height:1.7}

  .hidden{display:none!important}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(16px);background:var(--ink);color:#fff;
    font-weight:600;font-size:13px;padding:11px 20px;border-radius:9px;opacity:0;transition:.2s;pointer-events:none;z-index:9}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---- mobile / narrow ---- */
  @media (max-width:820px){
    html,body{height:auto}
    .app{min-height:100vh}
    .appbar{flex-direction:column;align-items:flex-start;gap:14px;padding:18px 18px}
    .main{min-height:0}
    .pane2{display:block;height:auto}
    .controls{border-right:none;border-bottom:1px solid var(--line);padding:24px 18px}
    .results{padding:22px 18px}
    .centerpane{padding:28px 18px}
    .pw .val{font-size:14px}
  }
</style>
</head>
<body>
<div class="app">
  <div class="appbar">
    <div class="brand"><span class="mark"><svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true"><rect x="4.5" y="10.5" width="15" height="10.5" rx="2.4" fill="#fff"/><path d="M7.8 10.5 V7.6 a4.2 4.2 0 0 1 8.4 0 V10.5" fill="none" stroke="#fff" stroke-width="2.1"/><circle cx="12" cy="14.8" r="1.5" fill="#0d0f12"/><rect x="11.25" y="14.9" width="1.5" height="3" rx="0.7" fill="#0d0f12"/></svg></span><h1>PassForge</h1></div>
    <div class="tabs">
      <button class="tab active" id="tab-gen">Generate</button>
      <button class="tab" id="tab-check">Check yours</button>
    </div>
  </div>

  <div class="main">
    <!-- GENERATE -->
    <section id="panel-gen" class="pane2">
      <div class="controls">
        <div class="block">
          <div class="lbl"><span class="t">Length</span><span class="v" id="lenVal">16</span></div>
          <input type="range" id="len" min="6" max="48" value="16" />
        </div>
        <div class="toggles">
          <label class="tg"><span>Uppercase A–Z</span><span class="switch"><input type="checkbox" id="o-upper" checked><span class="track"></span></span></label>
          <label class="tg"><span>Lowercase a–z</span><span class="switch"><input type="checkbox" id="o-lower" checked><span class="track"></span></span></label>
          <label class="tg"><span>Numbers 0–9</span><span class="switch"><input type="checkbox" id="o-num" checked><span class="track"></span></span></label>
          <label class="tg"><span>Symbols !@#$</span><span class="switch"><input type="checkbox" id="o-sym" checked><span class="track"></span></span></label>
          <label class="tg"><span>No look-alikes</span><span class="switch"><input type="checkbox" id="o-similar"><span class="track"></span></span></label>
          <label class="tg"><span>No brackets</span><span class="switch"><input type="checkbox" id="o-ambig"><span class="track"></span></span></label>
        </div>
        <div class="btnrow">
          <button class="btn primary" id="genBtn">Generate</button>
          <button class="btn ghost" id="reBtn">Refresh</button>
        </div>
      </div>

      <div class="results">
        <div class="listhead"><span>12 passwords</span><span>entropy</span></div>
        <div class="list" id="list"></div>
      </div>
    </section>

    <!-- CHECK -->
    <section id="panel-check" class="centerpane hidden">
      <div class="checkinner">
        <div class="lbl"><span class="t">Test a password</span></div>
        <div class="inputwrap">
          <input type="password" class="checkbox-input" id="check" placeholder="Type or paste…" autocomplete="off" spellcheck="false" />
          <button class="eye" id="eye" title="Show / hide">👁</button>
        </div>
        <div class="meter"><i id="cbar"></i></div>
        <div class="cgrid">
          <div class="cbox"><div class="t">Strength</div><div class="v" id="crating">—</div></div>
          <div class="cbox"><div class="t">Entropy</div><div class="v" id="cbits">— <small>bits</small></div></div>
        </div>
        <div class="hint">Entropy assumes a random password — real words, names or patterns are weaker. Your input never leaves this page; everything runs locally.</div>
      </div>
    </section>
  </div>
</div>
<div class="toast" id="toast">Copied to clipboard</div>

<script>
(function(){
  const SETS = { upper:'ABCDEFGHIJKLMNOPQRSTUVWXYZ', lower:'abcdefghijklmnopqrstuvwxyz', num:'0123456789', sym:'!@#$%^&*-_=+;:,.?/|~' };
  const SYM_BRACKETS = '()[]{}<>';
  const LOOKALIKE = /[il1IoO0B8S5Z2]/g;
  const $ = id => document.getElementById(id);

  function randInt(max){ const limit=Math.floor(0xFFFFFFFF/max)*max,buf=new Uint32Array(1); let x; do{crypto.getRandomValues(buf);x=buf[0];}while(x>=limit); return x%max; }
  const pick = s => s[randInt(s.length)];
  function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=randInt(i+1); [a[i],a[j]]=[a[j],a[i]]; } return a; }

  function buildPool(){
    const active=[];
    if($('o-upper').checked) active.push('upper');
    if($('o-lower').checked) active.push('lower');
    if($('o-num').checked) active.push('num');
    if($('o-sym').checked) active.push('sym');
    if(!active.length) return null;
    const noBr=$('o-ambig').checked, noLk=$('o-similar').checked;
    const sets = active.map(k=>{ let s=SETS[k]; if(k==='sym'&&!noBr) s+=SYM_BRACKETS; if(noLk) s=s.replace(LOOKALIKE,''); return s; }).filter(s=>s.length);
    return sets.length?sets:null;
  }
  function makePassword(len, sets){
    const all=sets.join(''), chars=[];
    for(const s of sets){ if(chars.length<len) chars.push(pick(s)); }
    while(chars.length<len) chars.push(pick(all));
    return { pw:shuffle(chars).join(''), pool:all.length };
  }
  const entropyBits = (len,pool)=> pool>1 ? len*Math.log2(pool) : 0;

  function rating(bits){
    if(bits < 36)  return ['Very weak', Math.max(7,bits/36*22)];
    if(bits < 60)  return ['Weak',      22+(bits-36)/24*26];
    if(bits < 80)  return ['Strong',    48+(bits-60)/20*30];
    if(bits < 100) return ['Very strong',78+(bits-80)/20*15];
    return ['Excellent', 100];
  }

  const esc = s => s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  function colorize(pw){
    return [...pw].map(ch=>{
      if(/[0-9]/.test(ch)) return '<span class="d">'+esc(ch)+'</span>';
      if(/[^A-Za-z0-9]/.test(ch)) return '<span class="s">'+esc(ch)+'</span>';
      return esc(ch);
    }).join('');
  }

  function generate(){
    const list=$('list'); list.innerHTML='';
    const base=+$('len').value, sets=buildPool();
    if(!sets){ list.innerHTML='<div class="pw"><span class="val" style="color:var(--muted)">Select at least one character set.</span></div>'; return; }
    for(let i=0;i<12;i++){
      const len=Math.max(6, Math.min(64, base-5+i));   // spread of lengths → different entropy per row
      const {pw,pool}=makePassword(len,sets);
      const bits=Math.round(entropyBits(len,pool));
      const row=document.createElement('div'); row.className='pw';
      const val=document.createElement('span'); val.className='val'; val.innerHTML=colorize(pw); val.title='Click to copy'; val.onclick=()=>copy(pw);
      const badge=document.createElement('span'); badge.className='bits'; badge.textContent=bits+' bits';
      const cp=document.createElement('button'); cp.className='cp'; cp.textContent='⧉'; cp.title='Copy'; cp.onclick=()=>copy(pw);
      row.append(val,badge,cp); list.appendChild(row);
    }
  }

  function estimatePool(pw){ let p=0; if(/[a-z]/.test(pw))p+=26; if(/[A-Z]/.test(pw))p+=26; if(/[0-9]/.test(pw))p+=10; if(/[^A-Za-z0-9]/.test(pw))p+=33; return p; }
  function checkNow(){
    const pw=$('check').value, bar=$('cbar'), r=$('crating'), b=$('cbits');
    if(!pw){ bar.style.width='0'; r.textContent='—'; b.innerHTML='— <small>bits</small>'; return; }
    const pool=estimatePool(pw), bits=entropyBits(pw.length,pool);
    const [label,pct]=rating(bits);
    bar.style.width=Math.min(100,pct)+'%';
    r.textContent=label;
    b.innerHTML=Math.round(bits)+' <small>bits</small>';
  }

  function copy(txt){
    const done=()=>{ const t=$('toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1100); };
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done).catch(fb); } else fb();
    function fb(){ const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');done();}catch(e){} ta.remove(); }
  }

  function show(which){
    const g=which==='gen';
    $('tab-gen').classList.toggle('active',g); $('tab-check').classList.toggle('active',!g);
    $('panel-gen').classList.toggle('hidden',!g); $('panel-check').classList.toggle('hidden',g);
  }
  $('tab-gen').onclick=()=>show('gen');
  $('tab-check').onclick=()=>{ show('check'); $('check').focus(); };

  $('len').addEventListener('input',()=>{ $('lenVal').textContent=$('len').value; generate(); });
  document.querySelectorAll('.toggles input').forEach(c=>c.addEventListener('change',generate));
  $('genBtn').addEventListener('click',generate);
  $('reBtn').addEventListener('click',generate);
  $('check').addEventListener('input',checkNow);
  $('eye').addEventListener('click',()=>{ const i=$('check'); i.type = i.type==='password'?'text':'password'; });

  window.__pf = { makePassword, buildPool, entropyBits, estimatePool, rating, randInt, colorize };
  generate();
})();
</script>
</body>
</html>
